app:
  name: "AiOpsHub Backend"
  mode: "debug"

server:
  port: "8080"
  read_timeout: "10s"
  write_timeout: "10s"

database:
  host: "192.168.100.10"
  port: 5432
  user: "aiops"
  password: "aiops123"
  dbname: "aiopsdb"

redis:
  host: "192.168.100.114"
  port: 6379
  password: "1qaz!QAZ"
  db: 0
  cluster_mode: true
  cluster_nodes:
    - "192.168.100.113:6379"
    - "192.168.100.114:6379"
    - "192.168.100.115:6379"
    - "192.168.100.116:6379"
    - "192.168.100.117:6379"
    - "192.168.100.118:6379"

temporal:
  host: "192.168.100.10"
  port: 7233
  namespace: "default"
  task_queue: "aiops-task-queue"

llm:
  provider: "aliyun_bailian"
  model: "glm-5.2"  # 切换到支持thinking的模型（从glm-5.2改为deepseek-r1）
  api_key: "sk-086920878fb641a3bea1ce785eacb200"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  temperature: 0.7
  max_tokens: 131072
  enable_rag: true  # 启用RAG功能,自动从Milvus检索知识增强对话

agent:
  cache_size: 100  # Agent实例缓存大小（LRU）
  max_tool_calls: 5  # 默认最大工具调用次数
  routing_timeout: 30  # 路由决策超时时间（秒）
  tool_timeout: 60  # 工具执行超时时间（秒）

milvus:
  host: "192.168.100.10"
  port: 19530
  collection: "aiops_knowledge"

chat:
  enable_history: true  # 启用对话历史上下文功能
  max_history_messages: 20  # 获取的最大历史消息数量
  max_history_tokens: 60000  # 历史上下文最大token数
  max_total_tokens: 13000  # 总token限制（包括历史和当前消息）

embedding:
  provider: "aliyun_bailian"
  model: "text-embedding-v2"
  api_key: "sk-086920878fb641a3bea1ce785eacb200"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

prometheus:
  url: "http://localhost:9090"

kubernetes:
  enabled: false
  kubeconfig: ""

jwt:
  secret: "aiops-jwt-secret-key-2024"
  expire: "24h"

log:
  level: "info"
  format: "console"